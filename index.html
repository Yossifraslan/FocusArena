<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Focus Arena</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css"
    />
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Search for any training you want" />
        </div>
        <div class="header-icons">
          <button class="icon-btn">
            <i class="fas fa-bell"></i>
            <span class="notification-dot"></span>
          </button>
          <button class="icon-btn">
            <i class="fas fa-user"></i>
          </button>
        </div>
      </div>

      <div class="main-content">
        <div class="title-section">
          <div class="greeting" id="greeting"></div>
          <h1>
            You've got <span class="task-count" id="task-count">0</span>
            today
            <button class="add-btn" onclick="openModal()">
              <i class="fas fa-plus"></i>
              Add New
            </button>
          </h1>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
